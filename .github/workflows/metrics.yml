name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: nimra736
          template: classic
          base: activity, repositories, metadata
          config_timezone: Asia/Karachi
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, dockerfile
          plugin_languages_details: percentage, bytes-size
          plugin_languages_limit: 8
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_followup: yes
          plugin_followup_sections: user
          plugin_followup_indepth: yes
          plugin_calendar: yes
          plugin_calendar_limit: 2
