name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: nimra736
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Karachi
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, dockerfile
          plugin_languages_details: percentage, bytes-size
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_lines: yes
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_followup: yes
          plugin_followup_sections: user

      - name: Generate metrics-plugins.svg
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-plugins.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: nimra736
          base: ""
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          config_timezone: Asia/Karachi
